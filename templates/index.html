{% extends 'base.html' %}

{% block content %}

< a href="/add" class="btn">+ Novo Produto</a>

<table>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Preço</th>
        <th>Ações</th>
    </tr>

    {% for p in produtos %}
    <tr>
        <td>{{ p[0] }}</td>
        <td>{{ p[1] }}</td>
        <td>R$ {{ p[2] }}</td>
        <td>
            <a href="/edit/{{ p[0] }}">Editar</a>
            <a href="/delete/{{ p[0] }}">Excluir</a>
        </td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
